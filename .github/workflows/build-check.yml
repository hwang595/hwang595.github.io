name: Build Check

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4

      - name: Install dependencies
        run: bundle install

      - name: Validate publication metadata
        run: ruby scripts/publication_tools.rb validate

      - name: List publication links
        run: ruby scripts/publication_tools.rb check-links --dry-run

      - name: Build with Jekyll
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      - name: Audit generated site quality
        run: bundle exec ruby scripts/quality_tools.rb audit
