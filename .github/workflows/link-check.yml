name: Publication Link Check

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4

      - name: Validate publication metadata
        run: ruby scripts/publication_tools.rb validate

      - name: Check publication links
        run: ruby scripts/publication_tools.rb check-links
