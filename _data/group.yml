identity:
  name: "RAISL"
  label: "RAISL at Rutgers CS"
  logo: "/images/raisl-logo-display.png"
  tagline: "Research systems for capable, efficient, and trustworthy machine learning."
  description: "RAISL is Hongyi Wang's research group at Rutgers Computer Science. We build practical machine learning systems across LLM infrastructure, distributed training, federated learning, optimization, and trustworthy evaluation."
  institution: "Department of Computer Science, Rutgers University"
  office: "CBIM 009"
  email: "hw689@cs.rutgers.edu"

themes:
  - title: "LLM Infrastructure"
    summary: "Training, serving, transparency, and evaluation infrastructure for large language models under real system constraints."
    tags:
      - "Open Models"
      - "Evaluation"
      - "Serving"
  - title: "Efficient ML Systems"
    summary: "Algorithms and systems for efficient model training, compression, low-rank adaptation, and distributed optimization."
    tags:
      - "Optimization"
      - "Compression"
      - "Training"
  - title: "Federated and Private ML"
    summary: "Learning systems that work across distributed, heterogeneous, and sensitive data while respecting privacy and deployment limits."
    tags:
      - "Federated Learning"
      - "Privacy"
      - "Robustness"
  - title: "Trustworthy ML Workflows"
    summary: "Data, benchmarks, and agentic workflows that make machine learning systems more inspectable, useful, and reliable."
    tags:
      - "Benchmarks"
      - "Agents"
      - "Reliability"

