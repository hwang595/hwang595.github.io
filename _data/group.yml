joining:
  intro: "We welcome students who enjoy building real systems, asking careful research questions, and turning ideas into working artifacts."
  paths:
    - title: "Prospective PhD Students"
      text: "Apply through Rutgers Computer Science and mention RAISL or Hongyi Wang in your application when your interests align with our research areas."
    - title: "Rutgers MS and Undergraduate Students"
      text: "Email a short note with your research interests, relevant coursework or projects, and a CV or resume."
    - title: "Collaborators"
      text: "We are interested in collaborations around efficient training, LLM infrastructure, open models, federated learning, and trustworthy evaluation."
  email_subject: "Prospective RAISL Researcher"
